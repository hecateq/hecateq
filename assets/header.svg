<svg fill="none" viewBox="0 0 800 140" width="800" height="140" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradientShift {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes glow {
          0%, 100% { text-shadow: 0 0 8px rgba(88,166,255,0.4); }
          50% { text-shadow: 0 0 20px rgba(88,166,255,0.7), 0 0 40px rgba(88,166,255,0.3); }
        }
        .card {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 100%;
          height: 140px;
          background: linear-gradient(135deg, #0d1117 0%, #161b22 40%, #0d1117 100%);
          background-size: 200% 200%;
          animation: gradientShift 8s ease infinite;
          font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
          box-sizing: border-box;
          border-bottom: 1px solid rgba(88,166,255,0.15);
        }
        .title {
          font-size: 28px;
          font-weight: 700;
          letter-spacing: 6px;
          color: #e6edf3;
          margin: 0;
          animation: fadeIn 1s ease-out, glow 4s ease-in-out infinite;
          text-transform: uppercase;
        }
        .subtitle {
          font-size: 11px;
          letter-spacing: 3px;
          color: #58a6ff;
          margin-top: 10px;
          text-transform: uppercase;
          animation: fadeIn 1.5s ease-out;
          opacity: 0.85;
        }
        .dots {
          display: flex;
          gap: 6px;
          margin-top: 14px;
          animation: fadeIn 2s ease-out;
        }
        .dot {
          width: 4px;
          height: 4px;
          border-radius: 50%;
          background: #58a6ff;
          opacity: 0.5;
        }
        .dot:nth-child(2) { opacity: 0.7; }
        .dot:nth-child(3) { opacity: 1; }
        .dot:nth-child(4) { opacity: 0.7; }
        .dot:nth-child(5) { opacity: 0.5; }
      </style>
      <div class="card">
        <div class="title">Hecateq</div>
        <div class="subtitle">Deterministic AI Agent Workflows &amp; Developer Tooling</div>
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
